kind = "web"
previewPath = "/"
title = "Cribs"
version = "1.0.0"
id = "artifacts/cribs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22274

[services.development]
run = "pnpm --filter @workspace/cribs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cribs", "run", "build" ]
publicDir = "artifacts/cribs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22274"
BASE_PATH = "/"
